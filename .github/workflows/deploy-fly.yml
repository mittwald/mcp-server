name: Deploy to Fly.io (Immutable, Verified)

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
      - 'src/**'
      - '.github/workflows/deploy-fly.yml'
  workflow_dispatch:

jobs:
  deploy:
    concurrency:
      group: deploy-${{ matrix.app }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: mittwald-oauth-server
            context: packages/oauth-bridge
            dockerfile: packages/oauth-bridge/Dockerfile
            fly_config: packages/oauth-bridge/fly.toml
            hostname: mittwald-oauth-server.fly.dev
          - app: mittwald-mcp-fly2
            context: .
            dockerfile: Dockerfile
            fly_config: packages/mcp-server/fly.toml
            hostname: mittwald-mcp-fly2.fly.dev

    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Compute build metadata
        id: meta
        run: |
          echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      # NOTE: Pre-compile step removed - Dockerfile handles build.
      # This saves ~2-3 minutes per deploy.

      - name: Set version secrets (sha, build time)
        run: |
          flyctl secrets set \
            GIT_SHA=${{ steps.meta.outputs.sha }} \
            BUILD_TIME=${{ steps.meta.outputs.build_time }} \
            -a ${{ matrix.app }} --stage

      - name: Deploy from source (remote builder)
        run: |
          # Use Fly remote builder to build and deploy from source using app credentials.
          # Secrets staged earlier (GIT_SHA, IMAGE_DIGEST, BUILD_TIME) become visible to the app.
          flyctl deploy --config "${{ matrix.fly_config }}" --strategy immediate --detach --verbose \
            --env ALLOW_FLY_RELEASE=true


      - name: Diagnostics on failure (status + recent logs)
        if: failure()
        continue-on-error: true
        run: |
          set +e
          APP=${{ matrix.app }}
          echo "Fly status for $APP:";
          flyctl status -a "$APP" --json | jq '.' || flyctl status -a "$APP" || true
          echo "\nLast 100 lines of logs:";
          flyctl logs -a "$APP" --no-tail 2>&1 | tail -100 || true

      - name: Cleanup stopped/stale machines (best-effort)
        continue-on-error: true
        run: |
          set +e
          json=$(flyctl status -a ${{ matrix.app }} --json 2>/dev/null || echo '{}')
          ids=$(echo "$json" | jq -r 'if (.machines | type) == "array" then (.machines[] | select(.state != "started") | .id) else empty end')
          if [ -n "$ids" ]; then
            echo "$ids" | xargs -r -n1 flyctl machine destroy -a ${{ matrix.app }} --force
          fi

  smoke:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (repo)
        run: |
          npm ci --no-audit --no-fund

      - name: Install Newman
        run: |
          npm i -g newman

      - name: Wait for apps to be healthy
        run: |
          set -euo pipefail
          declare -A apps
          apps[mittwald-oauth-server.fly.dev]=mittwald-oauth-server
          apps[mittwald-mcp-fly2.fly.dev]=mittwald-mcp-fly2

          for host in "${!apps[@]}"; do
            app="${apps[$host]}"
            echo "Waiting for $app (https://$host/health)"
            ok=0
            for attempt in $(seq 1 36); do # up to 3 minutes @ 5s
              status_json=$(flyctl status -a "$app" --json 2>/dev/null || echo '{}')
              if echo "$status_json" | jq -e -r '
                (.Machines // []) as $machines
                | ($machines | map(select(.state == "started"))) as $started_machines
                | if ($started_machines | length) == 0 then false
                  else
                    $started_machines | all(
                      (.checks // []) as $checks
                      | if ($checks | length) == 0 then true
                        else $checks | all(.status == "passing")
                        end
                    )
                  end
              ' >/dev/null 2>&1 && curl -fsS --max-time 6 "https://$host/health" >/dev/null 2>&1; then
                echo "✅ $host is healthy"
                ok=1
                break
              fi
              sleep 5
            done
            if [ "$ok" != "1" ]; then
              echo "💥 Health failed for $host" >&2
              echo "$status_json" | jq '.' >&2 || true
              curl -v --max-time 10 "https://$host/health" || true
              exit 22
            fi
          done

      - name: Verify deployed version
        run: |
          set -euo pipefail
          sha="${GITHUB_SHA}"
          for host in mittwald-oauth-server.fly.dev mittwald-mcp-fly2.fly.dev; do
            echo "Checking version on https://$host/version"
            body=$(curl -fsSL "https://$host/version")
            echo "$body" | jq -e --arg sha "$sha" '.gitSha == $sha'
            echo "✅ $host reports gitSha=$sha"
          done

      - name: Run Postman (Newman) smoke
        run: |
          newman run tests/postman/Mittwald-MCP.postman_collection.json \
            -e tests/postman/Mittwald-MCP.postman_environment.json \
            --env-var mcp_base=https://mittwald-mcp-fly2.fly.dev \
            --env-var as_base=https://mittwald-oauth-server.fly.dev

      - name: Bridge registration sanity
        run: |
          set -e
          cat > dcr.json <<'JSON'
          {
            "redirect_uris": ["https://chatgpt.com/connector_platform_oauth_redirect"],
            "token_endpoint_auth_method": "none",
            "grant_types": ["authorization_code", "refresh_token"],
            "response_types": ["code"],
            "client_name": "CI Smoke",
            "application_type": "native"
          }
          JSON
          CODE=$(curl -sS -o body.json -w "%{http_code}" -H 'Content-Type: application/json' --data @dcr.json https://mittwald-oauth-server.fly.dev/register || true)
          echo "Bridge registration HTTP $CODE" && cat body.json
          if [ "$CODE" != "201" ]; then
            echo "Bridge registration failed" >&2; exit 1;
          fi

      - name: Run OAuth smoke tests
        env:
          OAUTH_SERVER_URL: https://mittwald-oauth-server.fly.dev
          MCP_SERVER_URL: https://mittwald-mcp-fly2.fly.dev
        run: |
          set -e
          echo "Running post-deploy OAuth smoke suite"
          npm run test:smoke
