name: Deploy to Fly.io (Immutable, Verified)

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
      - 'src/**'
      - '.github/workflows/deploy-fly.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: mittwald-oauth-server
            context: packages/oauth-server
            dockerfile: packages/oauth-server/Dockerfile
            fly_config: packages/oauth-server/fly.toml
            hostname: mittwald-oauth-server.fly.dev
          - app: mittwald-mcp-fly2
            context: .
            dockerfile: Dockerfile
            fly_config: packages/mcp-server/fly.toml
            hostname: mittwald-mcp-fly2.fly.dev

    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly auth
        run: |
          flyctl auth token || true
          flyctl auth docker

      - name: Docker login to Fly registry
        run: echo "$FLY_API_TOKEN" | docker login registry.fly.io -u x --password-stdin

      - name: Compute build metadata
        id: meta
        run: |
          echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Pre-compile TypeScript (fail-fast)
        run: |
          set -e
          CTX="${{ matrix.context }}"
          if [ -f "$CTX/package.json" ]; then
            echo "Pre-building in $CTX";
            pushd "$CTX" >/dev/null
            npm ci --no-audit --no-fund
            npm run build
            popd >/dev/null
          else
            echo "No package.json in $CTX; skipping pre-compile"
          fi

      # Skip manual docker push. Fly remote builder will build + publish in deploy step.
      # This avoids registry permission pitfalls and simplifies digest handling.

      - name: Set version secrets (sha, digest, build time)
        run: |
          flyctl secrets set \
            GIT_SHA=${{ steps.meta.outputs.sha }} \
            IMAGE_DIGEST=sha256:${{ steps.build.outputs.digest }} \
            BUILD_TIME=${{ steps.meta.outputs.build_time }} \
            -a ${{ matrix.app }} --stage

      - name: Deploy from source (remote builder)
        run: |
          # Use Fly remote builder to build and deploy from source using app credentials.
          # Secrets staged earlier (GIT_SHA, IMAGE_DIGEST, BUILD_TIME) become visible to the app.
          flyctl deploy --config "${{ matrix.fly_config }}" --strategy immediate --detach --verbose

      - name: Verify /version endpoint reflects commit SHA
        run: |
          set -e
          # Allow some time for rollout and health checks
          sleep 5
          HOST=${{ matrix.hostname }}
          body=$(curl -fsSL "https://$HOST/version")
          echo "$body"
          echo "$body" | jq -e --arg sha "${{ steps.meta.outputs.sha }}" '.gitSha == $sha'

      - name: Verify /version endpoint (digest optional)
        run: |
          set -e
          URL="https://${{ matrix.hostname }}/version"
          echo "GET $URL"
          curl -fsSL "$URL" | jq '.'

      - name: Cleanup stopped/stale machines
        run: |
          # destroy any non-started machines to avoid future auto-start staleness
          ids=$(flyctl status -a ${{ matrix.app }} --json | jq -r '.machines[] | select(.state != "started") | .id')
          if [ -n "$ids" ]; then
            echo "$ids" | xargs -r -n1 flyctl machine destroy -a ${{ matrix.app }} --force
          fi
