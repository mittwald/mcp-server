name: Fly Logs (On-Demand)

on:
  workflow_dispatch:
    inputs:
      app:
        description: "Fly app name (e.g., mittwald-oauth-server or mittwald-mcp-fly2)"
        required: true
        default: "mittwald-oauth-server"
      region:
        description: "Optional region filter (e.g., fra)"
        required: false

jobs:
  logs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: App status
        run: |
          flyctl status -a "${{ github.event.inputs.app }}" || true

      - name: Machines list
        run: |
          flyctl machines list -a "${{ github.event.inputs.app }}" || true

      - name: Recent logs (static snapshot)
        run: |
          # --no-tail prints a recent batch and exits
          if [ -n "${{ github.event.inputs.region }}" ]; then
            flyctl logs -a "${{ github.event.inputs.app }}" -r "${{ github.event.inputs.region }}" -n || true
          else
            flyctl logs -a "${{ github.event.inputs.app }}" -n || true
          fi

