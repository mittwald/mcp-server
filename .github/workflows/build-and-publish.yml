name: Build and Publish Container Images

on:
  push:
    tags:
      - 'v*'
  
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - package: mcp-server
            dockerfile: Dockerfile
            image: mittwald/mcp-server-http
          - package: oauth-server
            dockerfile: packages/oauth-bridge/Dockerfile
            image: mittwald/mcp-server-oauth
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  terraform-deploy:
    runs-on: ubuntu-latest
    needs: build-and-publish

    defaults:
      run:
        working-directory: deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="image_tag=${{ steps.version.outputs.tag }}"
        env:
          TF_VAR_mittwald_api_key: ${{ secrets.MITTWALD_API_KEY }}
          TF_VAR_server_id: ${{ secrets.MITTWALD_SERVER_ID }}
          TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_dockerhub_password: ${{ secrets.DOCKERHUB_TOKEN }}
