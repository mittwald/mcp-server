name: Security Checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  secret-scanning:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for git scanning

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (root)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Run npm audit (oauth-bridge)
        working-directory: packages/oauth-bridge
        run: npm audit --audit-level=high
        continue-on-error: false

  credential-leakage:
    name: Check for Credential Leakage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security test suite
        run: npm run test:security

      - name: Check for hardcoded secrets (repo-wide)
        run: |
          # Comprehensive secret patterns
          PATTERNS='(password|secret|api[_-]?key|auth[_-]?token|private[_-]?key|access[_-]?token)\s*[:=]\s*["\x27][^"\x27]{8,}'

          # Search all code files, excluding tests/mocks/examples
          if git grep -iE "$PATTERNS" -- \
            '*.ts' '*.js' '*.json' '*.yml' '*.yaml' '*.env' \
            ':!*.test.ts' ':!*.spec.ts' ':!*mock*' ':!*.example' \
            ':!.env.example' ':!*fixture*' ':!tests/' ':!*.md'; then
            echo "Potential hardcoded secrets detected"
            exit 1
          fi
          echo "No hardcoded secrets detected"

      - name: Check for AWS/GCP/Azure credentials
        run: |
          # Cloud provider credential patterns
          if git grep -E "(AKIA[0-9A-Z]{16}|AIza[0-9A-Za-z_-]{35}|projects/[^/]+/secrets/)" -- \
            '*.ts' '*.js' '*.json' '*.yml' '*.yaml' '*.env' \
            ':!*.example' ':!*.md'; then
            echo "Cloud provider credentials detected"
            exit 1
          fi
          echo "No cloud credentials detected"

      - name: Check for private keys
        run: |
          if git grep -l "BEGIN.*PRIVATE KEY" -- '*.ts' '*.js' '*.pem' '*.key' ':!*.md' ':!*.example'; then
            echo "Private key files detected in repository"
            exit 1
          fi
          echo "No private keys detected"

      - name: Lint for credential leaks
        run: npm run lint:credential-leak
